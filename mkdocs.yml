site_name: Rune
site_description: Production-grade AI agent runtime in Rust
site_url: https://raftio.github.io/rune/
repo_name: raftio/rune
repo_url: https://github.com/raftio/rune
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.tabs.link
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.snippets
  - toc:
      permalink: true
  - tables
  - def_list
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - First Agent: getting-started/first-agent.md
  - Concepts:
    - Agents: concepts/agents.md
    - Tools: concepts/tools.md
    - Compose: concepts/compose.md
    - Models: concepts/models.md
    - Workflows: concepts/workflows.md
    - Agent-to-Agent (A2A): concepts/a2a.md
    - Channels: concepts/channels.md
  - Reference:
    - spec.yaml: reference/spec-yaml.md
    - runtime.yaml: reference/runtime-yaml.md
    - models.yaml: reference/models-yaml.md
    - tools/*.yaml: reference/tools-yaml.md
    - workflow.yaml: reference/workflow-yaml.md
    - rune-compose.yaml: reference/compose-yaml.md
    - CLI: reference/cli.md
    - HTTP API: reference/api.md
  - Architecture:
    - Overview: architecture/overview.md
  - Examples:
    - Example Agents: examples/index.md
